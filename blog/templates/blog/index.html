<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>Blog</title>
    </head>
    <body>
        <h1>블로그 페이지 목록</h1>
        {% for p in posts %} <!-- Django 제공 기능인 '템플릿 태그' -->
            <hr/>
            <h3>{{ p.title }}</h3> <!-- Django 제공 기능인 '템플릿 변수 출력'-->
            <h4>{{ p.created_at }}</h4>
            <p> {{ p.content }}</p>
        {% endfor %} # <!-- 이건 그냥 for 문 끝났다고. -->
    </body>
</html>
